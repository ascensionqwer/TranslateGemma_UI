<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator - TranslateGemma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .language-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 25px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .language-selector select {
            padding: 12px 20px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            min-width: 180px;
            transition: border-color 0.3s;
        }

        .language-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .swap-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .swap-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .swap-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .translation-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .text-panel {
            padding: 25px;
            position: relative;
        }

        .text-panel:first-child {
            border-right: 1px solid #e9ecef;
        }

        .text-panel label {
            display: block;
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 10px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .output-text {
            background: #f8f9fa;
            color: #212529;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-copy {
            background: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background: #218838;
        }

        .loading {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 25px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            color: #6c757d;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .status.error {
            color: #dc3545;
            background: #f8d7da;
        }

        .status.success {
            color: #28a745;
            background: #d4edda;
        }

        @media (max-width: 768px) {
            .translation-area {
                grid-template-columns: 1fr;
            }

            .text-panel:first-child {
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }

            .language-selector {
                flex-direction: column;
            }

            .swap-btn {
                order: -1;
            }
        }
    </style>
</head>

    <script>
        // Use Flask backend API to avoid CORS issues
        const API_BASE = window.location.origin;
        const OLLAMA_API = 'http://localhost:11434/api/chat';
        const MODEL = 'translategemma:27b';

        // Language name mapping for display
        const languageNames = {
            'en': 'English', 'es': 'Spanish', 'fr': 'French', 'de': 'German',
            'it': 'Italian', 'pt': 'Portuguese', 'ru': 'Russian', 'ja': 'Japanese',
            'ko': 'Korean', 'zh-Hans': 'Chinese (Simplified)', 'zh-Hant': 'Chinese (Traditional)',
            'ar': 'Arabic', 'hi': 'Hindi', 'bn': 'Bengali', 'tr': 'Turkish',
            'vi': 'Vietnamese', 'th': 'Thai', 'nl': 'Dutch', 'pl': 'Polish',
            'sv': 'Swedish', 'da': 'Danish', 'fi': 'Finnish', 'no': 'Norwegian',
            'el': 'Greek', 'he': 'Hebrew', 'id': 'Indonesian', 'ms': 'Malay',
            'uk': 'Ukrainian', 'cs': 'Czech', 'sk': 'Slovak', 'hu': 'Hungarian',
            'ro': 'Romanian', 'bg': 'Bulgarian', 'sr': 'Serbian', 'hr': 'Croatian',
            'sl': 'Slovenian', 'et': 'Estonian', 'lv': 'Latvian', 'lt': 'Lithuanian',
            'fa': 'Persian', 'ur': 'Urdu', 'ta': 'Tamil', 'te': 'Telugu',
            'ml': 'Malayalam', 'kn': 'Kannada', 'mr': 'Marathi', 'gu': 'Gujarati',
            'pa': 'Punjabi', 'sw': 'Swahili', 'af': 'Afrikaans', 'am': 'Amharic',
            'my': 'Burmese', 'km': 'Khmer', 'lo': 'Lao', 'ne': 'Nepali',
            'si': 'Sinhala', 'tl': 'Tagalog', 'cy': 'Welsh', 'ga': 'Irish',
            'hy': 'Armenian', 'ka': 'Georgian', 'mn': 'Mongolian', 'ps': 'Pashto',
            'sq': 'Albanian', 'az': 'Azerbaijani', 'bs': 'Bosnian', 'mk': 'Macedonian',
            'mt': 'Maltese'
        };

        function getLanguageName(code) {
            return languageNames[code] || code;
        }

        function buildPrompt(sourceLang, targetLang, text) {
            const sourceName = getLanguageName(sourceLang);
            const targetName = getLanguageName(targetLang);
            
            // Following the exact prompt format from TranslateGemma documentation
            return `You are a professional ${sourceName} (${sourceLang}) to ${targetName} (${targetLang}) translator. Your goal is to accurately convey the meaning and nuances of the original ${sourceName} text while adhering to ${targetName} grammar, vocabulary, and cultural sensitivities.
Produce only the ${targetName} translation, without any additional explanations or commentary. Please translate the following ${sourceName} text into ${targetName}:


${text}`;
        }

        async function translate() {
            const sourceText = document.getElementById('sourceText').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const targetTextEl = document.getElementById('targetText');
            const loadingEl = document.getElementById('loading');
            const statusEl = document.getElementById('status');
            const translateBtn = document.getElementById('translateBtn');

            if (!sourceText) {
                showStatus('Please enter text to translate.', 'error');
                return;
            }

            if (sourceLang === targetLang) {
                showStatus('Source and target languages must be different.', 'error');
                return;
            }

            // Show loading state
            loadingEl.classList.add('active');
            translateBtn.disabled = true;
            statusEl.className = 'status';
            statusEl.textContent = 'Connecting to Ollama...';

            try {
                // Use Flask backend API to avoid CORS issues
                const response = await fetch(`${API_BASE}/api/translate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        source_lang: sourceLang,
                        target_lang: targetLang,
                        text: sourceText
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success && data.translation) {
                    targetTextEl.value = data.translation;
                    showStatus('Translation completed successfully!', 'success');
                } else {
                    throw new Error('No translation content received');
                }

            } catch (error) {
                console.error('Translation error:', error);
                targetTextEl.value = '';
                
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    showStatus('Cannot connect to Ollama. Make sure Ollama is running on localhost:11434', 'error');
                } else if (error.message.includes('404') || error.message.includes('model')) {
                    showStatus(`Model '${MODEL}' not found. Run: ollama pull ${MODEL}`, 'error');
                } else {
                    showStatus(`Error: ${error.message}`, 'error');
                }
            } finally {
                loadingEl.classList.remove('active');
                translateBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        function swapLanguages() {
            const sourceLang = document.getElementById('sourceLang');
            const targetLang = document.getElementById('targetLang');
            const sourceText = document.getElementById('sourceText');
            const targetText = document.getElementById('targetText');

            // Swap language selections
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            // Swap text content
            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;
        }

        function clearSource() {
            document.getElementById('sourceText').value = '';
            document.getElementById('targetText').value = '';
            showStatus('Ready to translate.', '');
        }

        function copyTranslation() {
            const targetText = document.getElementById('targetText').value;
            
            if (!targetText) {
                showStatus('No translation to copy.', 'error');
                return;
            }

            navigator.clipboard.writeText(targetText)
                .then(() => {
                    showStatus('Translation copied to clipboard!', 'success');
                })
                .catch(err => {
                    console.error('Copy failed:', err);
                    showStatus('Failed to copy. Please try again.', 'error');
                });
        }

        // Allow Enter key to trigger translation (with Ctrl/Cmd)
        document.getElementById('sourceText').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                translate();
            }
        });

        // Auto-resize textarea based on content
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 400) + 'px';
        }

        document.getElementById('sourceText').addEventListener('input', function() {
            autoResize(this);
        });

        // Add click event listener for translate button
        document.getElementById('translateBtn').addEventListener('click', translate);

        // Add click event listener for quit button
        document.getElementById('quitBtn').addEventListener('click', async function() {
            if (confirm('Are you sure you want to quit TranslateGemma?')) {
                try {
                    await fetch(`${API_BASE}/api/shutdown`, { method: 'POST' });
                    showStatus('Shutting down...', 'success');
                    setTimeout(() => {
                        window.close();
                    }, 1000);
                } catch (e) {
                    console.error('Shutdown error:', e);
                    showStatus('Error shutting down', 'error');
                }
            }
        });
    </script>
